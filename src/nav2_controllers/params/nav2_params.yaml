# nav2_params.yaml
# Минимальный конфиг Nav2 для TurtleBot3 + MPPI controller
# Работает в глобальном фрейме "odom" (без карты и AMCL).

############################################
# CONTROLLER SERVER (MPPI)
############################################
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.05
      stateful: True

    FollowPath:
      plugin: "nav2_controllers::MppiNav2Controller"

      # Параметры MPPI (совпадают с MPPIParams в C++)
      dt: 0.1
      horizon_steps: 20
      n_rollouts: 200

      v_mean: 0.2
      omega_mean: 0.0

      v_std: 0.04
      omega_std: 0.25

      v_min: -0.05
      v_max: 0.15
      omega_min: -1.0
      omega_max: 1.0

      w_goal: 1.0
      w_obs: 50.0
      w_ctrl: 0.3
      w_speed: 0.1
      w_dyn_obs: 20.0
      dyn_obs_sigma: 0.35
      dyn_obs_cutoff: 1.2

      lambda: 1.0
      debug_rollouts_enabled: true
      debug_rollouts_top_n: 10
      debug_rollouts_line_width: 0.02
      debug_rollouts_topic: /mppi_debug_rollouts
      dyn_people_enabled: true
      dyn_people_topic: /predicted_people_markers

############################################
# PLANNER SERVER (простая глобальная прокладка)
############################################
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlanner2D"
      tolerance: 0.5
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 64
      lookup_table_size: 20.0
      cost_travel_multiplier: 1.0
      cost_penalty: 1.3
      minimum_turning_radius: 0.0

############################################
# BT NAVIGATOR
############################################
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    default_nav_to_pose_bt_xml: "navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "navigate_through_poses_w_replanning_and_recovery.xml"

############################################
# BEHAVIOR SERVER (recovery behaviors)
############################################
behavior_server:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    behavior_plugins: ["spin", "backup", "wait"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.05
      stateful: True

    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

############################################
# SMOOTHER SERVER
############################################
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]

    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000

############################################
# WAYPOINT FOLLOWER
############################################
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor: "wait_at_waypoint"

    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0.0

############################################
# VELOCITY SMOOTHER
############################################
velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.22, 0.0, 2.84]   # x, y, theta (TurtleBot3)
    min_velocity: [-0.22, 0.0, -2.84]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom"

############################################
# GLOBAL COSTMAP (работаем в odom)
############################################
global_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    update_frequency: 5.0
    publish_frequency: 2.0
    rolling_window: false
    width: 10.0
    height: 10.0
    resolution: 0.05
    robot_radius: 0.22
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: scan
      scan:
        topic: scan
        max_obstacle_height: 2.0
        clearing: true
        marking: true
        data_type: "LaserScan"
        obstacle_range: 3.0
        raytrace_range: 5.0

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      enabled: true
      inflation_radius: 0.6
      cost_scaling_factor: 3.0
    
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      enabled: true
      map_subscribe_transient_local: true

############################################
# LOCAL COSTMAP
############################################
local_costmap:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    update_frequency: 10.0
    publish_frequency: 5.0
    rolling_window: true
    width: 5.0
    height: 5.0
    resolution: 0.05
    robot_radius: 0.22
    plugins: ["obstacle_layer", "inflation_layer"]

    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      observation_sources: scan
      scan:
        topic: scan
        max_obstacle_height: 2.0
        clearing: true
        marking: true
        data_type: "LaserScan"
        obstacle_range: 3.0
        raytrace_range: 5.0

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      enabled: true
      inflation_radius: 0.6
      cost_scaling_factor: 3.0
