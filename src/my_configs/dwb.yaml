controller_server:
  ros__parameters:
    use_sim_time: true
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      # лимиты TB3
      min_vel_x: 0.0
      max_vel_x: 0.22
      max_vel_theta: 2.84
      acc_lim_x: 2.5
      acc_lim_theta: 3.2

      vx_samples: 20
      vtheta_samples: 40
      sim_time: 1.5

      critics:
        - RotateToGoal
        - Oscillation
        - ObstacleFootprint
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist

      GoalAlign:
        scale: 24.0
      PathAlign:
        scale: 32.0
      PathDist:
        scale: 32.0
      GoalDist:
        scale: 24.0
      ObstacleFootprint:
        scale: 0.01
        footprint_clearing_enabled: true
      RotateToGoal:
        scale: 32.0
        slowing_factor: 5.0
        lookahead_time: -1.0
      Oscillation:
        scale: 1.0

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerLattice"
      tolerance: 0.25

bt_navigator:
  ros__parameters:
    use_sim_time: true

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3.0
      height: 3.0
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 10.0
      plugin_names: ["obstacle_layer", "inflation_layer"]
      plugin_types:
        - "nav2_costmap_2d::ObstacleLayer"
        - "nav2_costmap_2d::InflationLayer"
