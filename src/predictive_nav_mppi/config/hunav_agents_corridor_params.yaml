hunav_loader:
  ros__parameters:
    yaml_base_name: corridor_agents
    simulator: Gazebo Classic
    map: long_corridor
    publish_people: true

    # ── Global goals ────────────────────────────────────────────────
    # World: 20m x 6.6m, corridor walls at y=±1.8
    # Gaps:  x=-9.5 (left end), x=-3.5 (mid-left), x=1.5 (mid-right), x=9.5 (right end)
    #
    # Goals 1-4: central corridor only (for 14 straight-corridor agents)
    # Goals 5-28: 4-waypoint circuits around each of the 6 wall segments
    #
    #   Circuit pattern (clockwise viewed from above):
    #     [below-right gap] → [above-right gap] → [above-left gap] → [below-left gap]
    #     "below" = y=1.2 inside main corridor; "above" = y=2.3 inside side corridor
    #
    global_goals:
      # ── central corridor ──
      1:  {x:  7.0, y:  0.4}   # right end, top lane
      2:  {x: -7.0, y:  0.4}   # left end,  top lane
      3:  {x:  7.0, y: -0.4}   # right end, bottom lane
      4:  {x: -7.0, y: -0.4}   # left end,  bottom lane

      # ── top-left wall circuit  (x∈[-9,-4], gaps at x=-9.5 and x=-3.5) ──
      5:  {x: -3.5, y:  1.2}   # right gap, below
      6:  {x: -3.5, y:  2.3}   # right gap, above
      7:  {x: -9.5, y:  2.3}   # left gap,  above
      8:  {x: -9.5, y:  1.2}   # left gap,  below

      # ── top-mid wall circuit  (x∈[-3,1], gaps at x=-3.5 and x=1.5) ──
      9:  {x: -3.5, y:  1.2}
      10: {x: -3.5, y:  2.3}
      11: {x:  1.5, y:  2.3}
      12: {x:  1.5, y:  1.2}

      # ── top-right wall circuit  (x∈[2,9], gaps at x=1.5 and x=9.5) ──
      13: {x:  1.5, y:  1.2}
      14: {x:  1.5, y:  2.3}
      15: {x:  9.5, y:  2.3}
      16: {x:  9.5, y:  1.2}

      # ── bottom-left wall circuit  (x∈[-9,-4], gaps at x=-9.5 and x=-3.5) ──
      17: {x: -3.5, y: -1.2}
      18: {x: -3.5, y: -2.3}
      19: {x: -9.5, y: -2.3}
      20: {x: -9.5, y: -1.2}

      # ── bottom-mid wall circuit  (x∈[-3,1], gaps at x=-3.5 and x=1.5) ──
      21: {x: -3.5, y: -1.2}
      22: {x: -3.5, y: -2.3}
      23: {x:  1.5, y: -2.3}
      24: {x:  1.5, y: -1.2}

      # ── bottom-right wall circuit  (x∈[2,9], gaps at x=1.5 and x=9.5) ──
      25: {x:  1.5, y: -1.2}
      26: {x:  1.5, y: -2.3}
      27: {x:  9.5, y: -2.3}
      28: {x:  9.5, y: -1.2}

    agents:
      - agent1
      - agent2
      - agent3
      - agent4
      - agent5
      - agent6
      - agent7
      - agent8
      - agent9
      - agent10
      - agent11
      - agent12
      - agent13
      - agent14
      - agent15
      - agent16
      - agent17
      - agent18
      - agent19
      - agent20

    # ════════════════════════════════════════════════════════════════
    # WALL CIRCUIT AGENTS (1-6)  — каждый обходит один сегмент стены
    # ════════════════════════════════════════════════════════════════

    # agent1: обходит corridor_top_left (x∈[-9,-4])
    agent1:
      id: 1
      group_id: -1
      skin: 1
      max_vel: 0.42
      radius: 0.10
      goal_radius: 0.30
      cyclic_goals: true
      init_pose: {x: -9.5, y: 2.3, z: -1.0, h: 0.0}
      behavior:
        type: Regular
        configuration: 1
        goal_force_factor: 3.5
        obstacle_force_factor: 10.0
        social_force_factor: 3.5
        other_force_factor: 0.3
      goals: [7, 8, 5, 6]

