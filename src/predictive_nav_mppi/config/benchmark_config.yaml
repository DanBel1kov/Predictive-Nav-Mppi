benchmark:
  scenario: long_corridor

  mppi_mode: custom
  robot_model_name: waffle
  repeats: 1

  gui: false
  startup_delay_sec: 15.0
  nav_timeout_sec: 180.0
  settle_time_sec: 5.0
  sample_rate_hz: 10.0
  cooldown_sec: 8.0

  robot_radius: 0.22
  person_radius: 0.10
  personal_space: 0.60

  global_frame: map
  robot_frame: base_link
  people_topic: /people

  start:
    x: 0.0
    y: 0.0
    yaw: 0.0

  # 10 длинных маршрутов: большая часть пути по центральному коридору (от конца до конца или до проёма).
  # Коридор: |y|<1.8, x от ~-14 до ~14; проёмы при x≈-3.5 и x≈1.5.
  #
  # 1–4: старт у конца коридора → цель вне коридора (через проём): длинный прогон по коридору, затем выход.
  # 5–6: старт вне коридора → цель у противоположного конца коридора: вход, затем длинный прогон.
  # 7–10: весь путь по коридору от конца до конца.
  goals:
    # --- Коридор → выход наружу (длинный путь по коридору до проёма) ---
    - start: { x: -12.0,  y: 0.0,  yaw: 0.0 }
      x: -3.5
      y:  3.2
      yaw: 0.0
    - start: { x: -12.0,  y: 0.0,  yaw: 0.0 }
      x:  1.5
      y: -3.2
      yaw: 0.0
    - start: { x: 12.0,   y: 0.0,  yaw: 3.14159 }
      x: -3.5
      y:  3.2
      yaw: 0.0
    - start: { x: 12.0,   y: 0.0,  yaw: 3.14159 }
      x:  1.5
      y: -3.2
      yaw: 0.0
    # --- Снаружи → длинный коридор до противоположного конца ---
    - start: { x: -3.5,   y: 3.2,  yaw: -1.57 }
      x:  12.0
      y:  0.0
      yaw: 0.0
    - start: { x: 1.5,   y: -3.2, yaw: 1.57 }
      x: -12.0
      y:  0.0
      yaw: 3.14159
    # --- Коридор от конца до конца ---
    - start: { x: -12.0,  y: 0.0,  yaw: 0.0 }
      x:  12.0
      y:  0.0
      yaw: 0.0
    - start: { x: 12.0,   y: 0.0,  yaw: 3.14159 }
      x: -12.0
      y:  0.0
      yaw: 3.14159
    - start: { x: -11.0,  y: 0.3,  yaw: 0.0 }
      x:  11.0
      y: -0.3
      yaw: 0.0
    - start: { x: 11.0,   y: 0.0,  yaw: 3.14159 }
      x: -11.0
      y:  0.0
      yaw: 3.14159

  output_dir: benchmark_results
