benchmark:
  scenario: long_corridor

  # "custom" = твой MPPI (nav2_controllers::MppiNav2Controller) + сэмплы траекторий в RViz + предсказания людей
  # "standard" = стандартный Nav2 MPPI (nav2_mppi_controller), без твоих критиков по людям
  mppi_mode: custom
  # People predictor: "kalman" (CV filter), "model" (Social GRU) or "social_vae"
  predictor_type: social_vae
  # SocialVAE paths
  social_vae_repo_path: "/home/danbel1kov/SocialVAE"
  social_vae_ckpt_path: "/home/danbel1kov/predictive-nav-mppi/src/predictive_nav_mppi/predictive_nav_mppi/models/vae_hotel"
  social_vae_config_path: "/home/danbel1kov/SocialVAE/config/hotel.py"
  social_vae_pred_samples: 20
  robot_model_name: waffle
  repeats: 1

  gui: false
  startup_delay_sec: 15.0
  nav_timeout_sec: 180.0
  settle_time_sec: 5.0
  sample_rate_hz: 10.0
  cooldown_sec: 8.0

  robot_radius: 0.22
  person_radius: 0.10
  personal_space: 0.60

  global_frame: map
  robot_frame: base_link
  people_topic: /people

  start:
    x: -8.0
    y: 0.0
    yaw: 0.0

  # long_corridor: 20m x 6.6m, x∈[-10,10], y∈[-3.3,3.25], центральный |y|<1.8
  # Длинные маршруты по карте; 2 старта не из центрального коридора; 2 финиша не в центральном
  goals:
    # Длинные по центральному коридору (старт не из центра карты)
    - start: { x: -8.5,  y: 0.4,  yaw: 0.0 }
      x:  8.5
      y:  0.4
      yaw: 0.0
    - start: { x:  8.5,  y: -0.4, yaw: 3.14159 }
      x: -8.5
      y: -0.4
      yaw: 3.14159
    - start: { x: -8.0,  y: 0.0,  yaw: 0.0 }
      x:  8.0
      y: -0.3
      yaw: 0.0
    - start: { x:  8.0,  y: -0.3, yaw: 3.14159 }
      x: -8.0
      y:  0.3
      yaw: 3.14159
    # Старт НЕ из центрального коридора (боковые)
    - start: { x: -8.5,  y: 2.5,  yaw: 0.0 }
      x:  8.5
      y:  0.0
      yaw: 0.0
    - start: { x:  8.5,  y: -2.5, yaw: 3.14159 }
      x: -8.5
      y:  0.0
      yaw: 3.14159
    # Финиш НЕ в центральном коридоре (боковые)
    - start: { x: -8.5,  y: 0.0,  yaw: 0.0 }
      x:  8.5
      y:  2.5
      yaw: 0.0
    - start: { x:  8.5,  y: 0.0,  yaw: 3.14159 }
      x: -8.5
      y: -2.5
      yaw: 3.14159
    # Ещё длинные маршруты
    - start: { x: -7.5,  y: 0.2,  yaw: 0.0 }
      x:  7.5
      y: -0.2
      yaw: 0.0
    - start: { x:  7.5,  y: -0.2, yaw: 3.14159 }
      x: -7.5
      y:  0.2
      yaw: 3.14159

  output_dir: benchmark_results
